name: "🪖 Rapport d'incident — LégionOS CYBER OPS"
description: "Signaler un problème, une anomalie ou un comportement suspect dans Termux‑BASHRC."
title: "[ISSUE] — "
labels: ["bug", "analysis", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Merci de contribuer à l’amélioration de **LégionOS CYBER OPS**.
        Remplis les sections ci‑dessous pour une analyse efficace.

  - type: textarea
    id: description
    attributes:
      label: "🔍 Description du problème"
      description: "Explique clairement ce qui ne fonctionne pas."
      placeholder: "Comportement observé…"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "🎯 Comportement attendu"
      placeholder: "Ce que tu pensais obtenir…"

  - type: textarea
    id: steps
    attributes:
      label: "🧪 Étapes pour reproduire"
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "🖥️ Environnement"
      placeholder: |
        - Appareil :
        - CPU / SoC :
        - Version Termux :
        - Version Bashrc :
        - Android :
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "📸 Logs / Captures"
      description: "Ajoute les sorties utiles (hud, diagnostic, threathunt…)."

  - type: dropdown
    id: severity
    attributes:
      label: "⚔️ Criticité"
      options:
        - Faible
        - Moyen
        - Élevé
        - Critique
    validations:
      required: true
